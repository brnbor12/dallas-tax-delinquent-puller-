server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — serve index.html for all non-file paths so client-side
    # routing works (e.g. /property/123 reloads correctly after a refresh).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the FastAPI container.
    # In Docker Compose, "api" resolves to the api service via internal DNS.
    location /api/ {
        proxy_pass         http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Martin tile server — served at /tiles/*
    location /tiles/ {
        proxy_pass         http://martin:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 30s;
    }
}
